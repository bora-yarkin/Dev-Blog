<!DOCTYPE html>
<html lang="en" class="theme-light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin login · {{ brand or 'CV + Blog' }}</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/admin.css') }}" />
</head>
<body class="admin-page">
  <div class="page">
    <header class="nav">
      <div class="nav-left" id="brand">{{ brand or 'Admin' }} · Login</div>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle color theme" aria-pressed="false"></button>
      </div>
    </header>

    <main class="column" style="max-width: 680px;">
      <section class="hero">
        <h1 class="section-title">Admin login</h1>
        <p class="muted" style="margin: 6px 0 18px;">Enter the admin credentials to continue.</p>
        {% if error %}
          <div class="pill" style="display: inline-flex; margin-bottom: 10px; background: var(--accent-soft); color: var(--accent);">
            {{ error }}
          </div>
        {% endif %}
        <form method="post" class="line-item" style="padding: 18px; display: flex; flex-direction: column; gap: 14px;">
          <div class="field-row">
            <div class="field-label">Username</div>
            <div class="field-input">
              <input type="text" name="username" autocomplete="username" required />
            </div>
          </div>
          <div class="field-row">
            <div class="field-label">Password</div>
            <div class="field-input">
              <input type="password" name="password" autocomplete="current-password" required />
            </div>
          </div>
          <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
            <a class="lang-toggle" href="/">Back to site</a>
            <button class="nav-cv" type="submit">Log in</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const THEME_ICONS = {
        sun: '<svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2" fill="none"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/><line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="7.1" y2="7.1"/><line x1="16.9" y1="16.9" x2="18.4" y2="18.4"/><line x1="5.6" y1="18.4" x2="7.1" y2="16.9"/><line x1="16.9" y1="7.1" x2="18.4" y2="5.6"/></g></svg>',
        moon: '<svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20 14.5a8.5 8.5 0 1 1-10.5-10 6.5 6.5 0 1 0 10.5 10Z"/></svg>'
      };
      const getPreferredTheme = () => {
        const stored = localStorage.getItem("theme");
        if (stored === "dark" || stored === "light") return stored;
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      };
      const applyTheme = (theme) => {
        const desired = theme === "dark" ? "dark" : "light";
        document.documentElement.classList.remove("theme-light", "theme-dark");
        document.documentElement.classList.add(desired === "dark" ? "theme-dark" : "theme-light");
        document.documentElement.style.colorScheme = desired;
        localStorage.setItem("theme", desired);
        const toggle = document.querySelector("#theme-toggle");
        if (toggle) {
          toggle.innerHTML = desired === "dark" ? THEME_ICONS.moon : THEME_ICONS.sun;
          toggle.setAttribute("aria-pressed", desired === "dark");
        }
      };
      document.addEventListener("DOMContentLoaded", () => {
        applyTheme(getPreferredTheme());
        const toggle = document.querySelector("#theme-toggle");
        if (toggle) {
          toggle.addEventListener("click", () => {
            const next = document.documentElement.classList.contains("theme-dark") ? "light" : "dark";
            applyTheme(next);
          });
        }
      });
    })();
  </script>
</body>
</html>
