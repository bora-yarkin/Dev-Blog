name: Feature request
description: Suggest an improvement to the product or project workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.
        Clear problem statements make feature requests much easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation are you seeing?
      placeholder: I am frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would you like to see?
      placeholder: It would help if ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, or related links
